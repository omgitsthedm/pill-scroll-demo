<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Scroll-driven pill expansion demo inspired by Rivian: pinned section, rapid image sequence, full-screen reveal, and optimized WebP assets." />
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="4" y="16" width="56" height="32" rx="16" fill="%23101010"/></svg>' />
  <title>Little Fight - GSAP Scrollytelling Pill</title>
  <style>
    :root {
      --bg-light: #e8e6dc;
      --bg-dark: #101010;
      --text: #111;
      --pill-w: min(72vw, 1040px);
      --pill-h: min(38vw, 540px);
      --pill-r: 999px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg-light);
    }

    .section {
      width: 100%;
      position: relative;
      scroll-snap-align: start;
    }

    .intro {
      min-height: 108vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(1200px 600px at 15% -10%, #fff 0%, rgba(255,255,255,0) 64%),
        linear-gradient(150deg, #f1f0e9, #d9d5c7);
    }

    .intro h1 {
      margin: 0;
      font-size: clamp(2rem, 5.4vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: -0.035em;
      font-weight: 500;
    }

    .intro p {
      margin: 12px 0 0;
      opacity: 0.68;
      font-size: clamp(0.92rem, 1.6vw, 1.08rem);
      letter-spacing: 0.01em;
    }

    .showcase {
      height: 100vh;
      background: var(--bg-dark);
      overflow: hidden;
      isolation: isolate;
    }

    .showcase-bg {
      position: absolute;
      inset: 0;
      background: #0f0f0f;
      opacity: 0;
      z-index: 0;
      will-change: opacity;
    }

    .pill {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--pill-w);
      height: var(--pill-h);
      border-radius: var(--pill-r);
      overflow: hidden;
      transform: translate(-50%, -50%);
      box-shadow:
        0 24px 90px rgba(0,0,0,0.46),
        0 5px 18px rgba(0,0,0,0.35);
      z-index: 2;
      will-change: width, height, border-radius, box-shadow;
    }

    .media {
      position: absolute;
      inset: 0;
      background: #151515;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.022);
      transition: opacity 85ms linear, transform 380ms cubic-bezier(0.2, 1, 0.3, 1);
      will-change: opacity;
    }

    .frame.active {
      opacity: 1;
      transform: scale(1);
    }

    .media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 58%, rgba(0,0,0,0.4) 100%);
      opacity: var(--overlay-opacity, 1);
      transition: opacity 220ms linear;
      pointer-events: none;
      z-index: 3;
    }

    .after {
      min-height: 120vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 56px 24px;
      background: #121212;
      color: #f3f3ef;
    }

    .after h2 {
      margin: 0;
      font-size: clamp(1.9rem, 5vw, 4.2rem);
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .after p {
      margin: 12px 0 0;
      opacity: 0.72;
      font-size: clamp(0.95rem, 1.65vw, 1.15rem);
    }

    @media (max-width: 860px) {
      :root {
        --pill-w: min(54vw, 300px);
        --pill-h: min(92vw, 560px);
      }

      .intro { min-height: 98vh; }
    }
  </style>
</head>
<body>
  <main id="main">
    <section class="section intro">
      <div>
        <h1>Scroll Into Motion</h1>
        <p>Pinned sequence: lock, flip, expand, release.</p>
      </div>
    </section>

    <section class="section showcase" id="showcase">
      <div class="showcase-bg" id="showcaseBg"></div>
      <div class="pill" id="pill">
        <div class="media" id="media"></div>
      </div>
    </section>

    <section class="section after" id="afterScene">
      <div>
        <h2>Next Scene</h2>
        <p>Sequence complete. Scroll continues normally.</p>
      </div>
    </section>
  </main>

  <script>
    const sources = [
      "assets/nyc-streets-businesses1-2.webp",
      "assets/nyc-streets-businesses2-2.webp",
      "assets/nyc-streets-businesses3-2.webp",
      "assets/nyc-streets-businesses4-2.webp",
      "assets/nyc-streets-businesses5.webp",
      "assets/nyc-streets-businesses6.webp",
      "assets/nyc-streets-businesses7.webp",
      "assets/nyc-cafes1-2.webp",
      "assets/nyc-cafes2-2.webp",
      "assets/nyc-grand-central-busy-2.webp",
      "assets/nyc-brooklyn-2.webp",
      "assets/nyc-small-business-owner-2.webp",
      "assets/nyc-outdoor-bar-2.webp",
      "assets/nyc-retail-2.webp",
      "assets/nyc-web-design.webp",
      "assets/website-design-nyc-1.webp"
    ];

    const showcase = document.getElementById("showcase");
    const bg = document.getElementById("showcaseBg");
    const pill = document.getElementById("pill");
    const media = document.getElementById("media");

    const frames = [];
    let activeIndex = 0;
    let prewarmStarted = false;
    let timelineInitialized = false;
    let engineLoading = false;

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }

    function mix(a, b, t) {
      return a + (b - a) * t;
    }

    function easeOutExpo(t) {
      return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function preloadFrames() {
      media.style.backgroundImage = `url("${sources[0]}")`;

      sources.forEach((src, idx) => {
        const img = document.createElement("img");
        img.className = "frame" + (idx === 0 ? " active" : "");
        img.alt = "Sequence frame " + (idx + 1);
        img.decoding = "async";
        img.fetchPriority = idx < 2 ? "high" : "low";
        if (idx < 2) {
          img.src = src;
          img.dataset.ready = "1";
        } else {
          img.dataset.src = src;
          img.dataset.ready = "0";
        }
        media.appendChild(img);
        frames.push(img);
      });
    }

    function prewarmSequenceFrames() {
      if (prewarmStarted) return;
      prewarmStarted = true;

      let i = 2;
      const pump = () => {
        if (i >= frames.length) return;
        const frame = frames[i];
        if (frame && frame.dataset.src && frame.dataset.ready !== "1") {
          frame.src = frame.dataset.src;
          frame.dataset.ready = "1";
        }
        i += 1;
        setTimeout(pump, 28);
      };
      pump();
    }

    function setFrame(index) {
      const safe = clamp(index, 0, frames.length - 1);
      let resolved = safe;

      if (!frames[resolved] || frames[resolved].dataset.ready !== "1") {
        while (resolved > 0 && frames[resolved].dataset.ready !== "1") {
          resolved -= 1;
        }
      }

      if (resolved === activeIndex) return;

      if (frames[activeIndex]) frames[activeIndex].classList.remove("active");
      frames[resolved].classList.add("active");
      activeIndex = resolved;
    }

    function rapidSequenceIndex(progress) {
      const flipStart = 0.12;
      const flipEnd = 0.72;
      const t = clamp((progress - flipStart) / (flipEnd - flipStart), 0, 1);

      if (t >= 1) return frames.length - 1;

      const loops = 8;
      const playable = Math.max(1, frames.length - 1);
      const step = Math.floor(t * playable * loops);
      return step % playable;
    }

    function render(progress) {
      const p = clamp(progress, 0, 1);

      const mobile = window.innerWidth <= 860;
      const startW = mobile ? Math.min(window.innerWidth * 0.52, 290) : Math.min(window.innerWidth * 0.68, 980);
      const startH = mobile ? Math.min(window.innerWidth * 0.9, 540) : Math.min(window.innerWidth * 0.36, 500);

      const expandStart = 0.1;
      const expandEnd = 0.88;
      const expandT = clamp((p - expandStart) / (expandEnd - expandStart), 0, 1);
      const expandEase = easeOutExpo(expandT);

      const w = mix(startW, window.innerWidth, expandEase);
      const h = mix(startH, window.innerHeight, expandEase);
      const rStart = Math.max(58, startH * 0.5);
      const r = mix(rStart, 0, easeInOutCubic(expandT));

      pill.style.setProperty("--pill-w", w.toFixed(2) + "px");
      pill.style.setProperty("--pill-h", h.toFixed(2) + "px");
      pill.style.setProperty("--pill-r", r.toFixed(2) + "px");

      const shA = mix(0.46, 0.04, p);
      const shB = mix(0.35, 0.02, p);
      pill.style.boxShadow = `0 24px 90px rgba(0,0,0,${shA.toFixed(3)}), 0 5px 18px rgba(0,0,0,${shB.toFixed(3)})`;

      bg.style.opacity = clamp((p - 0.02) * 1.26, 0, 1).toFixed(3);
      media.style.setProperty("--overlay-opacity", p > 0.86 ? "0" : "1");

      setFrame(rapidSequenceIndex(p));
    }

    function initTimeline() {
      if (timelineInitialized) return;
      if (!window.gsap || !window.ScrollTrigger) return;

      gsap.registerPlugin(ScrollTrigger);

      ScrollTrigger.create({
        trigger: showcase,
        start: "top top",
        end: "+=3800",
        pin: true,
        scrub: 0.34,
        anticipatePin: 1,
        invalidateOnRefresh: true,
        onEnter: () => prewarmSequenceFrames(),
        onEnterBack: () => prewarmSequenceFrames(),
        onUpdate: self => {
          render(self.progress);
        }
      });

      ScrollTrigger.refresh();
      timelineInitialized = true;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("Failed to load " + src));
        document.head.appendChild(s);
      });
    }

    async function ensureAnimationEngine() {
      if (timelineInitialized || engineLoading) return;
      engineLoading = true;
      try {
        if (!window.gsap) await loadScript("vendor/gsap.min.js");
        if (!window.ScrollTrigger) await loadScript("vendor/ScrollTrigger.min.js");
        initTimeline();
      } catch (_) {
        // If script loading fails, page still works as static content.
      } finally {
        engineLoading = false;
      }
    }

    function setupEngineBoot() {
      const io = new IntersectionObserver(
        entries => {
          for (const e of entries) {
            if (e.isIntersecting) {
              ensureAnimationEngine();
              prewarmSequenceFrames();
              io.disconnect();
              break;
            }
          }
        },
        { rootMargin: "20% 0px 20% 0px" }
      );
      io.observe(showcase);

      if ("requestIdleCallback" in window) {
        requestIdleCallback(() => ensureAnimationEngine(), { timeout: 3200 });
      } else {
        setTimeout(() => ensureAnimationEngine(), 2800);
      }
    }

    preloadFrames();
    render(0);

    if ("requestIdleCallback" in window) {
      requestIdleCallback(() => prewarmSequenceFrames(), { timeout: 4600 });
    } else {
      setTimeout(() => prewarmSequenceFrames(), 3600);
    }
    setupEngineBoot();
  </script>
</body>
</html>
